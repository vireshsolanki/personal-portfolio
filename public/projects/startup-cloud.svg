  <line x1="113" y1="205" x2="113" y2="265" stroke="#EEEEEE" stroke-opacity="0.5" stroke-width="1.5"/>
  <polygon points="109,261 113,269 117,261" fill="#EEEEEE" fill-opacity="0.5"/>

  <!-- Right side: CI/CD + Monitoring -->
  <rect x="410" y="110" width="360" height="100" rx="4" fill="#1A1A1A" stroke="#EEEEEE" stroke-opacity="0.2" stroke-width="1"/>
  <text x="590" y="130" text-anchor="middle" fill="#EEEEEE" font-family="monospace" font-size="9" font-weight="600">CI/CD PIPELINE</text>

  <rect x="425" y="138" width="70" height="55" rx="3" fill="#111111" stroke="#888888" stroke-opacity="0.2" stroke-width="1"/>
  <text x="460" y="158" text-anchor="middle" fill="#888888" font-family="monospace" font-size="8" font-weight="600">GitHub</text>
  <text x="460" y="172" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">Push</text>
  <text x="460" y="183" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">Trigger</text>

  <line x1="495" y1="165" x2="513" y2="165" stroke="#EEEEEE" stroke-opacity="0.5" stroke-width="1.2"/>
  <polygon points="513,162 519,165 513,168" fill="#EEEEEE" fill-opacity="0.5"/>

  <rect x="519" y="138" width="75" height="55" rx="3" fill="#111111" stroke="#EEEEEE" stroke-opacity="0.3" stroke-width="1"/>
  <text x="556" y="155" text-anchor="middle" fill="#EEEEEE" font-family="monospace" font-size="8" font-weight="600">GitHub</text>
  <text x="556" y="167" text-anchor="middle" fill="#EEEEEE" font-family="monospace" font-size="8" font-weight="600">Actions</text>
  <text x="556" y="180" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">Build+Test</text>
  <text x="556" y="191" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">+Deploy</text>

  <line x1="594" y1="165" x2="612" y2="165" stroke="#EEEEEE" stroke-opacity="0.5" stroke-width="1.2"/>
  <polygon points="612,162 618,165 612,168" fill="#EEEEEE" fill-opacity="0.5"/>

  <rect x="618" y="138" width="136" height="55" rx="3" fill="#111111" stroke="#888888" stroke-opacity="0.2" stroke-width="1"/>
  <text x="686" y="155" text-anchor="middle" fill="#888888" font-family="monospace" font-size="8" font-weight="600">ECR + ECS Deploy</text>
  <text x="686" y="170" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">Push image to ECR</text>
  <text x="686" y="182" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">Update ECS service</text>

  <!-- Monitoring -->
  <rect x="410" y="230" width="160" height="140" rx="4" fill="#1A1A1A" stroke="#888888" stroke-opacity="0.2" stroke-width="1"/>
  <text x="490" y="250" text-anchor="middle" fill="#888888" font-family="monospace" font-size="9" font-weight="600">MONITORING</text>
  <rect x="425" y="258" width="130" height="30" rx="3" fill="#111111" stroke="#888888" stroke-opacity="0.15" stroke-width="1"/>
  <text x="490" y="278" text-anchor="middle" fill="#888888" font-family="monospace" font-size="8">CloudWatch Dashboards</text>
  <rect x="425" y="295" width="130" height="30" rx="3" fill="#111111" stroke="#888888" stroke-opacity="0.15" stroke-width="1"/>
  <text x="490" y="315" text-anchor="middle" fill="#888888" font-family="monospace" font-size="8">Alerts → Slack / Email</text>
  <rect x="425" y="332" width="130" height="28" rx="3" fill="#111111" stroke="#EEEEEE" stroke-opacity="0.25" stroke-width="1"/>
  <text x="490" y="350" text-anchor="middle" fill="#EEEEEE" font-family="monospace" font-size="8">Cost budgets + alerts</text>

  <!-- Terraform -->
  <rect x="590" y="230" width="180" height="140" rx="4" fill="#1A1A1A" stroke="#EEEEEE" stroke-opacity="0.25" stroke-width="1"/>
  <text x="680" y="250" text-anchor="middle" fill="#EEEEEE" font-family="monospace" font-size="9" font-weight="600">TERRAFORM IaC</text>
  <text x="680" y="272" text-anchor="middle" fill="#555555" font-family="monospace" font-size="8">modules/vpc</text>
  <text x="680" y="287" text-anchor="middle" fill="#555555" font-family="monospace" font-size="8">modules/ecs</text>
  <text x="680" y="302" text-anchor="middle" fill="#555555" font-family="monospace" font-size="8">modules/rds</text>
  <text x="680" y="317" text-anchor="middle" fill="#555555" font-family="monospace" font-size="8">modules/monitoring</text>
  <line x1="620" y1="330" x2="750" y2="330" stroke="#888888" stroke-opacity="0.1" stroke-width="1"/>
  <text x="680" y="348" text-anchor="middle" fill="#888888" font-family="monospace" font-size="7">dev / staging / prod</text>
  <text x="680" y="360" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">S3 + DynamoDB state lock</text>

  <!-- Bottom -->
  <line x1="40" y1="420" x2="760" y2="420" stroke="#888888" stroke-opacity="0.08" stroke-width="1"/>
  <text x="400" y="438" text-anchor="middle" fill="#555555" font-family="monospace" font-size="8">Multi-env · Auto-scaling · IaC · Scaled 0 → 50k users</text>
</svg>
