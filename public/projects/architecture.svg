<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0A0A0A"/>
  <rect x="1" y="1" width="798" height="448" stroke="#C778DD" stroke-width="2"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#C778DD" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grid2)"/>
  
  <!-- Architecture diagram -->
  <g transform="translate(400, 225)">
    <!-- Containers -->
    <rect x="-120" y="-60" width="80" height="50" rx="8" fill="none" stroke="#C778DD" stroke-width="2"/>
    <text x="-80" y="-28" font-family="Arial" font-size="12" fill="#C778DD" text-anchor="middle">Container 1</text>
    
    <rect x="-20" y="-60" width="80" height="50" rx="8" fill="none" stroke="#C778DD" stroke-width="2"/>
    <text x="20" y="-28" font-family="Arial" font-size="12" fill="#C778DD" text-anchor="middle">Container 2</text>
    
    <rect x="80" y="-60" width="80" height="50" rx="8" fill="none" stroke="#C778DD" stroke-width="2"/>
    <text x="120" y="-28" font-family="Arial" font-size="12" fill="#C778DD" text-anchor="middle">Container 3</text>
    
    <!-- Load Balancer -->
    <rect x="-40" y="30" width="80" height="40" rx="8" fill="#C778DD" opacity="0.2"/>
    <text x="0" y="55" font-family="Arial" font-size="12" fill="#C778DD" text-anchor="middle" font-weight="600">ALB</text>
    
    <!-- CloudFront -->
    <circle cx="0" cy="-120" r="30" fill="none" stroke="#C778DD" stroke-width="2"/>
    <text x="0" y="-115" font-family="Arial" font-size="11" fill="#C778DD" text-anchor="middle" font-weight="600">CDN</text>
    
    <!-- Connection lines -->
    <line x1="0" y1="-90" x2="-80" y2="-60" stroke="#C778DD" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="-90" x2="20" y2="-60" stroke="#C778DD" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="-90" x2="120" y2="-60" stroke="#C778DD" stroke-width="1.5" opacity="0.6"/>
    
    <line x1="-80" y1="-10" x2="0" y2="30" stroke="#C778DD" stroke-width="1.5" opacity="0.6"/>
    <line x1="20" y1="-10" x2="0" y2="30" stroke="#C778DD" stroke-width="1.5" opacity="0.6"/>
    <line x1="120" y1="-10" x2="0" y2="30" stroke="#C778DD" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="350" font-family="Arial, sans-serif" font-size="28" font-weight="700" 
        fill="#C778DD" text-anchor="middle">ARCHITECTURE MODERNIZATION</text>
  <text x="400" y="380" font-family="Arial, sans-serif" font-size="14" 
        fill="#666" text-anchor="middle">Multi-tier • Containerized • CloudFront • ECS Fargate</text>
</svg>
