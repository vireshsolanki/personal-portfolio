<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0A0A0A"/>
  <rect x="1" y="1" width="798" height="448" stroke="#C778DD" stroke-width="2"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#C778DD" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grid)"/>
  
  <!-- Map pin icon -->
  <g transform="translate(400, 200)">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#C778DD" stroke-width="2" opacity="0.3"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#C778DD" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#C778DD" stroke-width="2" opacity="0.7"/>
    <path d="M0 -30 C-15 -30 -25 -20 -25 -5 C-25 10 0 30 0 30 C0 30 25 10 25 -5 C25 -20 15 -30 0 -30 Z" 
          fill="#C778DD" opacity="0.9"/>
    <circle cx="0" cy="-5" r="8" fill="#0A0A0A"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="320" font-family="Arial, sans-serif" font-size="28" font-weight="700" 
        fill="#C778DD" text-anchor="middle">GEOFENCE API</text>
  <text x="400" y="350" font-family="Arial, sans-serif" font-size="14" 
        fill="#666" text-anchor="middle">Serverless • Lambda • GraphQL • Real-time Tracking</text>
</svg>
