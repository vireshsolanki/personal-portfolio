<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C0C0C"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <g stroke="#888888" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="75" x2="800" y2="75"/><line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="160" y1="0" x2="160" y2="450"/><line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/><line x1="640" y1="0" x2="640" y2="450"/>
  </g>
  <text x="400" y="42" text-anchor="middle" fill="#EEEEEE" font-family="monospace" font-size="13" font-weight="700" letter-spacing="2">SERVERLESS GEOFENCE API</text>
  <text x="400" y="60" text-anchor="middle" fill="#555555" font-family="monospace" font-size="9">AWS Lambda · API Gateway · GraphQL · DynamoDB · Real-time location</text>
  <!-- Client -->
  <rect x="30" y="185" width="90" height="80" rx="4" fill="#1A1A1A" stroke="#888888" stroke-opacity="0.2" stroke-width="1"/>
  <text x="75" y="210" text-anchor="middle" fill="#888888" font-family="monospace" font-size="9" font-weight="600">CLIENT</text>
  <text x="75" y="225" text-anchor="middle" fill="#555555" font-family="monospace" font-size="8">Mobile App</text>
  <text x="75" y="240" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">GPS coords</text>
  <text x="75" y="253" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">GraphQL req</text>
  <line x1="120" y1="225" x2="155" y2="225" stroke="#EEEEEE" stroke-opacity="0.5" stroke-width="1.5"/>
  <polygon points="155,221 163,225 155,229" fill="#EEEEEE" fill-opacity="0.5"/>
  <!-- API Gateway -->
  <rect x="163" y="168" width="120" height="114" rx="4" fill="#1A1A1A" stroke="#EEEEEE" stroke-opacity="0.45" stroke-width="1"/>
  <text x="223" y="190" text-anchor="middle" fill="#EEEEEE" font-family="monospace" font-size="9" font-weight="600">API Gateway</text>
  <rect x="175" y="198" width="96" height="22" rx="2" fill="#111111" stroke="#888888" stroke-opacity="0.2" stroke-width="1"/>
  <text x="223" y="212" text-anchor="middle" fill="#888888" font-family="monospace" font-size="8">POST /graphql</text>
  <rect x="175" y="226" width="96" height="20" rx="2" fill="#111111" stroke="#888888" stroke-opacity="0.15" stroke-width="1"/>
  <text x="223" y="239" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">Auth: Cognito JWT</text>
  <rect x="175" y="251" width="96" height="18" rx="2" fill="#111111" stroke="#888888" stroke-opacity="0.15" stroke-width="1"/>
  <text x="223" y="263" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">Throttle: 10k/s</text>
  <line x1="283" y1="225" x2="318" y2="225" stroke="#EEEEEE" stroke-opacity="0.5" stroke-width="1.5"/>
  <polygon points="318,221 326,225 318,229" fill="#EEEEEE" fill-opacity="0.5"/>
  <!-- Lambda -->
  <rect x="326" y="152" width="145" height="145" rx="4" fill="#1A1A1A" stroke="#EEEEEE" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="398" y="174" text-anchor="middle" fill="#EEEEEE" font-family="monospace" font-size="9" font-weight="600">Lambda Functions</text>
  <rect x="338" y="182" width="121" height="28" rx="2" fill="#111111" stroke="#888888" stroke-opacity="0.2" stroke-width="1"/>
  <text x="398" y="193" text-anchor="middle" fill="#888888" font-family="monospace" font-size="7" font-weight="600">geofence-resolver</text>
  <text x="398" y="204" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">GraphQL resolvers</text>
  <rect x="338" y="216" width="121" height="28" rx="2" fill="#111111" stroke="#888888" stroke-opacity="0.2" stroke-width="1"/>
  <text x="398" y="227" text-anchor="middle" fill="#888888" font-family="monospace" font-size="7" font-weight="600">location-checker</text>
  <text x="398" y="238" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">Point-in-polygon algo</text>
  <rect x="338" y="250" width="121" height="28" rx="2" fill="#111111" stroke="#888888" stroke-opacity="0.2" stroke-width="1"/>
  <text x="398" y="261" text-anchor="middle" fill="#888888" font-family="monospace" font-size="7" font-weight="600">event-publisher</text>
  <text x="398" y="272" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">Enter/Exit → SNS</text>
  <text x="398" y="289" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">P99: &lt;50ms cold start: &lt;80ms</text>
  <line x1="471" y1="208" x2="506" y2="208" stroke="#EEEEEE" stroke-opacity="0.4" stroke-width="1.2"/>
  <polygon points="506,205 512,208 506,211" fill="#EEEEEE" fill-opacity="0.4"/>
  <line x1="471" y1="265" x2="506" y2="265" stroke="#888888" stroke-opacity="0.3" stroke-width="1.2"/>
  <polygon points="506,262 512,265 506,268" fill="#888888" fill-opacity="0.3"/>
  <!-- DynamoDB -->
  <rect x="512" y="168" width="130" height="100" rx="3" fill="#1A1A1A" stroke="#EEEEEE" stroke-opacity="0.35" stroke-width="1"/>
  <text x="577" y="190" text-anchor="middle" fill="#EEEEEE" font-family="monospace" font-size="9" font-weight="600">DynamoDB</text>
  <text x="577" y="207" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">geofences table</text>
  <text x="577" y="220" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">GSI: region → zones</text>
  <text x="577" y="233" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">events table</text>
  <text x="577" y="246" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">On-demand billing</text>
  <text x="577" y="259" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">DAX cache layer</text>
  <!-- Kinesis -->
  <rect x="512" y="286" width="130" height="78" rx="3" fill="#1A1A1A" stroke="#888888" stroke-opacity="0.2" stroke-width="1"/>
  <text x="577" y="306" text-anchor="middle" fill="#888888" font-family="monospace" font-size="9" font-weight="600">Kinesis Stream</text>
  <text x="577" y="323" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">Location events buffer</text>
  <text x="577" y="337" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">S3 archive via Firehose</text>
  <text x="577" y="351" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">Real-time processing</text>
  <!-- SNS -->
  <rect x="666" y="152" width="110" height="80" rx="3" fill="#1A1A1A" stroke="#888888" stroke-opacity="0.25" stroke-width="1"/>
  <text x="721" y="172" text-anchor="middle" fill="#888888" font-family="monospace" font-size="9" font-weight="600">SNS Topics</text>
  <text x="721" y="190" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">geofence-enter</text>
  <text x="721" y="203" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">geofence-exit</text>
  <text x="721" y="216" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">→ SQS / Webhook</text>
  <!-- CloudWatch -->
  <rect x="666" y="250" width="110" height="80" rx="3" fill="#1A1A1A" stroke="#888888" stroke-opacity="0.2" stroke-width="1"/>
  <text x="721" y="270" text-anchor="middle" fill="#888888" font-family="monospace" font-size="9" font-weight="600">CloudWatch</text>
  <text x="721" y="287" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">Lambda metrics</text>
  <text x="721" y="300" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">Error rate alerts</text>
  <text x="721" y="313" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">Latency dashboard</text>
  <!-- Stats row -->
  <rect x="30" y="340" width="260" height="58" rx="4" fill="#1A1A1A" stroke="#888888" stroke-opacity="0.15" stroke-width="1"/>
  <text x="160" y="358" text-anchor="middle" fill="#888888" font-family="monospace" font-size="8" font-weight="600">PERFORMANCE</text>
  <text x="72" y="378" text-anchor="middle" fill="#EEEEEE" font-family="monospace" font-size="11" font-weight="700">10k+</text>
  <text x="72" y="390" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">req/sec</text>
  <text x="160" y="378" text-anchor="middle" fill="#EEEEEE" font-family="monospace" font-size="11" font-weight="700">&lt;50ms</text>
  <text x="160" y="390" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">P99 latency</text>
  <text x="248" y="378" text-anchor="middle" fill="#EEEEEE" font-family="monospace" font-size="11" font-weight="700">$0</text>
  <text x="248" y="390" text-anchor="middle" fill="#555555" font-family="monospace" font-size="7">infra mgmt</text>
  <line x1="40" y1="420" x2="760" y2="420" stroke="#888888" stroke-opacity="0.08" stroke-width="1"/>
  <text x="400" y="438" text-anchor="middle" fill="#555555" font-family="monospace" font-size="8">Serverless · Pay-per-use · Auto-scaling · Zero server management</text>
</svg>
